name: Daily Telegram Reminder

on:
  schedule:
    # 1:00 AM UTC (e.g., 4:00 AM MSK / 9:00 AM SGT) - Morning Reminder
    - cron: '0 1 * * *'
    # 1:00 PM UTC (e.g., 4:00 PM MSK / 9:00 PM SGT) - Evening Reminder
    - cron: '0 13 * * *'
  
  # Allow manual runs from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      reminder_type:
        description: 'Select reminder type to force send'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - morning
          - evening

jobs:
  send-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # cache pip dependencies automatically

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Telegram Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Determine the execution mode based on the trigger event
          TYPE="auto"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TYPE="${{ github.event.inputs.reminder_type }}"
          elif [ "${{ github.event.schedule }}" = "0 1 * * *" ]; then
            TYPE="morning"
          elif [ "${{ github.event.schedule }}" = "0 13 * * *" ]; then
            TYPE="evening"
          fi

          echo "🚀 Executing Telegram reminder with type: $TYPE"
          python main.py --type $TYPE
